name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$GITHUB_REF_NAME" --title "PnP Bridge $GITHUB_REF_NAME" --notes-file "$NOTES_FILE"
          else
            gh release create "$GITHUB_REF_NAME" --title "PnP Bridge $GITHUB_REF_NAME" --generate-notes
          fi
