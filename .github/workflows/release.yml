name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create/release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          NOTES_FILE="docs/releases/${TAG}.md"
          ARGS=(--title "PnP Bridge $TAG")
          # Manual dispatch runs on a branch; gh creates the tag at this commit.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS+=(--target "$GITHUB_SHA")
          fi
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$TAG" "${ARGS[@]}" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" "${ARGS[@]}" --generate-notes
          fi
