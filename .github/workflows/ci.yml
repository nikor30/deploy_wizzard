name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check app tests
          uv run ruff format --check app tests
          uv run mypy
      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          uv sync
          cd frontend && npm ci
      - name: Install Playwright
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Run e2e suite
        run: |
          cd frontend && npm run build && cd ..
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  image:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t pnp-bridge:ci -f Containerfile .
      - name: Smoke test zero-config start (health + GUI)
        run: |
          # No PNPB_SECRET_KEY on purpose: the container must start with zero
          # configuration and serve both the API and the SPA.
          docker run -d -p 8060:8060 --name pnpb pnp-bridge:ci
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8060/api/health; then
              curl -fsS http://localhost:8060/ | grep -qi '<!doctype html>' && exit 0
              echo "health OK but / did not serve the SPA"
              break
            fi
            sleep 2
          done
          docker logs pnpb
          exit 1
