name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check app tests
          uv run ruff format --check app tests
          uv run mypy
      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  image:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t pnp-bridge:ci -f Containerfile .
      - name: Smoke test /api/health
        run: |
          # Fernet key = 32 url-safe base64 bytes; PNPB_SECRET_KEY is required at startup
          KEY=$(openssl rand -base64 32 | tr '+/' '-_')
          docker run -d -p 8060:8060 --name pnpb -e PNPB_SECRET_KEY="$KEY" pnp-bridge:ci
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8060/api/health; then exit 0; fi
            sleep 2
          done
          docker logs pnpb
          exit 1
